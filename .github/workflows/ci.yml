name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Build (Next.js)
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_MASTER_URL_KEY: ${{ secrets.NEXT_PUBLIC_MASTER_URL_KEY || 'placeholder' }}
          DESCOPE_CLIENT_ID: ${{ secrets.DESCOPE_CLIENT_ID || 'placeholder' }}
          DESCOPE_CLIENT_SECRET: ${{ secrets.DESCOPE_CLIENT_SECRET || 'placeholder' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'placeholder_secret_for_build_only_long_enough' }}
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  docker:
    name: Build production Docker image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: fixitnow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
