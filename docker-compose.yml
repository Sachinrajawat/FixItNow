services:
  mongo:
    image: mongo:7
    container_name: fixitnow-mongo
    restart: unless-stopped
    ports:
      # Mapped to 27018 on the host so it doesn't clash with a local Mongo
      # (e.g. an SSH-tunnelled instance). Inside the compose network the API
      # still talks to it on the default 27017 via the `mongo` hostname.
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: fixitnow-redis
    restart: unless-stopped
    ports:
      # 6380 on the host to avoid a clash with a local / tunnelled Redis.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fixitnow-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/fixitnow
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_me_change_me_please_now
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me_change_me_please_now
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: fixitnow-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - api

volumes:
  mongo_data:
